name: Screenshot Test

on:
  workflow_dispatch:

jobs:
  screenshot_job:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python環境の準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ブラウザと通信ライブラリのインストール
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: テストプログラムの実行
        run: python screenshot_test.py

      - name: 撮影したスクショをGitHubに保存
        uses: actions/upload-artifact@v4
        with:
          name: wsj-screenshot-result
          path: wsj_*.png
