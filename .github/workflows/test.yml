name: Screenshot Test

on:
  workflow_dispatch: # これを残しておくことで、いつでもボタンで手動実行できます
  schedule:
    # 毎日 UTC 12:00（＝日本時間 21:00）に自動実行するタイマー
    # 分 時 日 月 曜日 (すべて半角スペース区切り)
    - cron: '0 12 * * *'

jobs:
  screenshot_job:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python環境の準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ブラウザと通信ライブラリのインストール
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: テストプログラムの実行
        run: python screenshot_test.py

      - name: 撮影したスクショをGitHubに保存
        uses: actions/upload-artifact@v4
        with:
          name: wsj-screenshot-result
          path: wsj_*.png
