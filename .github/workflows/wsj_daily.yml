# 変更箇所①：一番上のワークフロー名（Actionsタブで表示される名前）
name: WSJ Daily Capture

on:
  workflow_dispatch:
  schedule:
    - cron: '0 12 * * *'

jobs:
  screenshot_job:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python環境の準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ブラウザと通信ライブラリのインストール
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      # 変更箇所②：実行するPythonファイルの名前を新しいものに合わせる
      - name: プログラムの実行
        run: python wsj_capture.py

      - name: 撮影したスクショをGitHubに保存
        uses: actions/upload-artifact@v4
        with:
          name: wsj-screenshot-result
          path: wsj_*.png
