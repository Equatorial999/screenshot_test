name: WSJ Daily Capture

on:
  workflow_dispatch:
  schedule:
    # -------------------------------------------------------------
    # 【テスト用】日本時間 朝10:00（UTC 01:00）に実行
    # 動作確認が終わったら、この行の頭に「#」をつけて無効化してください。
    # -------------------------------------------------------------
    - cron: '0 1 * * *'

    # -------------------------------------------------------------
    # 【本番用】日本時間 夜21:00（UTC 12:00）に実行
    # テスト中は行頭に「#」をつけてコメントアウト（無効化）しています。
    # -------------------------------------------------------------
    # - cron: '0 12 * * *'

jobs:
  screenshot_job:
    runs-on: ubuntu-latest
    steps:
      - name: コードを取得
        uses: actions/checkout@v4

      - name: Python環境の準備
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: ブラウザと通信ライブラリのインストール
        run: |
          pip install playwright requests
          playwright install chromium --with-deps

      - name: プログラムの実行
        run: python wsj_capture.py

      - name: 撮影したスクショをGitHubに保存
        uses: actions/upload-artifact@v4
        with:
          name: wsj-screenshot-result
          path: wsj_*.png
